<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keranjang Belanja - TradePro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <header class="bg-white shadow-sm sticky top-0">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="text-2xl font-bold">TradePro</h1>

      <div class="w-1/2">
        <input type="text" placeholder="Cari produk..." class="w-full border rounded-xl px-4 py-2" />
      </div>

      <div class="flex gap-4 items-center">
        <span onclick="showProfile()" class="cursor-pointer">👤</span>
        <span id="user-name" class="text-sm"></span>
        <span id="user-wa" class="text-sm text-gray-600"></span>
        <span id="cart-icon" onclick="openCart()" class="cursor-pointer">🛒</span>
      </div>
    </div>
  </header>

  <!-- Profile Modal -->
  <div id="profile-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg w-80">
      <h3 class="text-lg font-bold mb-4">Profil Pengguna</h3>
      <p>Nama: <span id="profile-name"></span></p>
      <p>WhatsApp: <span id="profile-wa"></span></p>
      <button onclick="logout()" class="mt-4 bg-red-500 text-white px-4 py-2 rounded">Logout</button>
      <button onclick="closeProfile()" class="mt-4 ml-2 bg-gray-500 text-white px-4 py-2 rounded">Tutup</button>
    </div>
  </div>

  <!-- Keranjang -->
  <section class="max-w-7xl mx-auto px-4 py-10">
    <h3 class="text-2xl font-semibold mb-6">Keranjang Belanja</h3>
    <div id="cart-items" class="space-y-4">
      <!-- Items will be loaded here -->
    </div>
    <div id="empty-cart" class="text-center text-gray-500 mt-10">
      Keranjang kosong. <a href="gopaldayat.html" class="text-blue-500">Mulai belanja</a>
    </div>
  </section>

  <script>
    if (!localStorage.getItem('user')) {
      window.location.href = 'login.html';
    }

    document.getElementById('user-name').textContent = localStorage.getItem('user') || '';
    document.getElementById('user-wa').textContent = localStorage.getItem('wa') || '';

    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const cartItems = document.getElementById('cart-items');
      const emptyCart = document.getElementById('empty-cart');
      
      if (cart.length === 0) {
        cartItems.innerHTML = '';
        emptyCart.style.display = 'block';
        return;
      }
      
      emptyCart.style.display = 'none';
      cartItems.innerHTML = cart.map((item, index) => {
        const qty = item.qty || 1;
        const priceValue = parseInt(String(item.price).replace(/\D/g, ''), 10) || 0;
        const subtotal = qty * priceValue;
        return `
          <div class="bg-white rounded-2xl shadow p-4 flex items-center gap-4">
            <img src="${item.img}" class="h-20 w-20 object-cover rounded-xl" />
            <div class="flex-1">
              <h4 class="font-semibold">${item.name}</h4>
              <p class="text-sm text-gray-500">Jumlah: ${qty}</p>
              <p class="font-bold">Subtotal: Rp ${subtotal.toLocaleString()}</p>
            </div>
            <button onclick="removeFromCart(${index})" class="bg-red-500 text-white px-4 py-2 rounded">Hapus</button>
          </div>
        `;
      }).join('');

      // Tambahkan tombol beli jika ada item
      if (cart.length > 0) {
        const total = cart.reduce((sum, item) => {
          const qty = item.qty || 1;
          const priceValue = parseInt(String(item.price).replace(/\D/g, ''), 10) || 0;
          return sum + qty * priceValue;
        }, 0);
        cartItems.innerHTML += `
          <div class="bg-white rounded-2xl shadow p-4 mt-6 text-center">
            <p class="text-lg font-bold">Total: Rp ${total.toLocaleString()}</p>
            <button onclick="buyNow()" class="bg-green-500 text-white px-6 py-3 rounded-xl mt-4">Beli Sekarang</button>
          </div>
        `;
      }
    }

    function removeFromCart(index) {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }

    function buyNow() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      if (cart.length === 0) return;

      // Simpan cart ke checkoutCart dan redirect ke checkout
      localStorage.setItem('checkoutCart', JSON.stringify(cart));
      window.location.href = 'checkout.html';
    }

    function showProfile() {
      document.getElementById('profile-name').textContent = localStorage.getItem('user');
      document.getElementById('profile-wa').textContent = localStorage.getItem('wa');
      document.getElementById('profile-modal').classList.remove('hidden');
    }

    function closeProfile() {
      document.getElementById('profile-modal').classList.add('hidden');
    }

    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    window.onload = loadCart;
  </script>

</body>
</html>
